<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Dept Notice | SR-Notify</title>
    <link rel="stylesheet" href="../../css/role.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --dept-pink: #1a237e;
            --dept-light: #fdf2f7;
            --bg-soft: #fcfcfc;
        }
 
        body { background-color: var(--bg-soft); }

        /* --- Header & Buttons --- */
        .btn-post { 
            background: rgba(255, 255, 255, 0.2); 
            color: white; 
            border: 1px solid rgba(255, 255, 255, 40.4); 
            padding: 8px 24px; 
            border-radius: 12px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.3s;
            backdrop-filter: blur(5px);
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        .btn-post:hover { background: white; color: var(--dept-pink); transform: translateY(-2px); }

        /* --- Input Containers --- */
        .priority-wrapper, .post-container { 
            background: white; 
            margin: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(179, 0, 75, 0.05);
            padding: 20px;
        }

        .priority-select, .date-input { 
            width: 100%; padding: 12px; border: 2px solid #fce4ec; border-radius: 10px; outline: none; background-color: #fff9fb; color: var(--dept-pink); font-weight: 600;
        }

        #noticeTitle { width: 100%; padding: 15px; border: none; border-bottom: 2px solid #f8bbd0; font-size: 1.2rem; font-weight: 700; outline: none; color: var(--dept-pink); margin-bottom: 10px;}
        #noticeContent { width: 100%; padding: 15px; border: 1px solid #f8bbd0; background: #fffcfd; border-radius: 12px; font-size: 1rem; resize: none; outline: none; height: 180px; box-sizing: border-box; }

        /* --- Target Selection (Pink Theme) --- */
        .target-box {
            flex: 1; border: 2px solid #fce4ec; padding: 12px 5px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s; background: #fff9fb;
        }
        .target-box i { display: block; font-size: 1.3rem; color: #d81b60; margin-bottom: 5px; opacity: 0.5; }
        .target-box span { font-size: 0.65rem; font-weight: 800; color: #888; }
        
        .target-box.active {
            border-color: var(--dept-pink); background: #fff; transform: scale(1.05); box-shadow: 0 4px 10px rgba(179, 0, 75, 0.1);
        }
        .target-box.active i { color: var(--dept-pink); opacity: 1; }
        .target-box.active span { color: var(--dept-pink); }

        /* --- Multi-Preview Styles --- */
        #attachmentArea { 
            display: none; padding: 15px; background: #fff; margin: 15px; border-radius: 20px; border: 2px dashed #f8bbd0;
        }
        .preview-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 10px; }
        .preview-item { aspect-ratio: 1/1; border-radius: 8px; overflow: hidden; border: 1px solid #f8bbd0; background: #fdf2f7; }
        .preview-item img, .preview-item video { width: 100%; height: 100%; object-fit: cover; }
        .remove-link { color: var(--dept-pink); font-size: 0.75rem; font-weight: bold; cursor: pointer; }

        /* --- FAB --- */
        .fab-container { position: fixed; bottom: 90px; right: 25px; z-index: 1000; }
        .attachment-menu { display: none; flex-direction: column; gap: 15px; margin-bottom: 15px; background: white; padding: 12px; border-radius: 30px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .attachment-menu.active { display: flex; }
        .btn-add-main { background: linear-gradient(135deg, var(--dept-pink), #ff4081); color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body class="admin-body">
    <header class="admin-header" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--dept-pink);">
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="../../assets/logo.png" alt="Logo" style="height: 40px;">
            <div class="header-text">
                <h2 style="margin: 0; color: white; font-size: 1.2rem;">SR-Notify</h2>
                <p style="margin: 0; color: rgba(255,255,255,0.8); font-size: 0.7rem;">DEPT DASHBOARD</p>
            </div>
        </div>
        <button type="button" onclick="publishDeptNotice()" class="btn-post">POST</button>
    </header>

    <!--<div class="priority-wrapper">
        <label style="font-size: 0.7rem; font-weight: 800; color: var(--dept-pink); text-transform: uppercase;">Notice Scope</label>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <div id="target-staff" class="target-box active" onclick="setDeptTarget('staff')">
                <i class="fas fa-chalkboard-teacher"></i>
                <span>TO STAFF</span>
            </div>
            <div id="target-students" class="target-box" onclick="setDeptTarget('students')">
                <i class="fas fa-user-graduate"></i>
                <span>TO STUDENTS</span>
            </div>
            <div id="target-all" class="target-box" onclick="setDeptTarget('all')">
                <i class="fas fa-users"></i>
                <span>EVERYONE</span>
            </div>
        </div>
    </div>-->

    <div class="priority-wrapper">
        <label style="font-size: 0.7rem; font-weight: 800; color: var(--dept-pink); text-transform: uppercase;">Category</label>
        <select id="noticePriority" class="priority-select" onchange="toggleDeptDate()">
            <option value="normal">📌 General Dept Notice</option>
            <option value="important">🚨 High Priority</option>
            <option value="event">🏫 Dept Event / Symposium</option>
        </select>
    </div>

    <main class="post-container">
        <div id="eventDateWrapper" style="display:none; margin-bottom: 10px;">
            <label style="font-weight:bold; color:var(--dept-pink); font-size: 0.8rem;">Event Date:</label>
            <input type="date" id="eventDate" class="date-input">
        </div>

        <input type="text" id="noticeTitle" placeholder="Notice Heading...">
        <textarea id="noticeContent" placeholder="Write department details here..."></textarea>
        
        <div style="margin-top:15px;">
            <label style="font-weight:bold; color:var(--dept-pink); font-size: 0.75rem; text-transform: uppercase;">Expiry Date</label>
            <input type="datetime-local" id="expiryDate" class="date-input">
        </div>
    </main>

    <div id="attachmentArea">
        <div class="preview-header">
            <span id="file-status" style="font-size: 0.75rem; font-weight: bold; color: var(--dept-pink);">0 MEDIA SELECTED</span>
            <span class="remove-link" onclick="clearDeptMedia()"><i class="fas fa-trash"></i> CLEAR</span>
        </div>
        <div id="preview-grid"></div>
        <input type="file" id="dept-file-input" multiple accept="image/*,video/*" style="margin-top: 15px; width: 100%;">
    </div>

    <div class="fab-container">
        <div class="attachment-menu" id="attachmentMenu">
            <i class="fas fa-camera-retro" id="mediaIcon" title="Add Media" style="color:var(--dept-pink); font-size:1.6rem; cursor:pointer;"></i>
        </div>
        <div class="btn-add-main" id="mainAddBtn"><i class="fas fa-paperclip"></i></div>
    </div>

    <script type="module" src="../../js/dept_post.js"></script>
    <script>
        const mainBtn = document.getElementById('mainAddBtn');
        const menu = document.getElementById('attachmentMenu');
        const mediaArea = document.getElementById('attachmentArea');
        const mediaIcon = document.getElementById('mediaIcon');
        const fileInput = document.getElementById('dept-file-input');
        const previewGrid = document.getElementById('preview-grid');
        const fileStatus = document.getElementById('file-status');

        // Logic for Department Target Selection
        window.currentDeptTarget = 'staff';
        window.setDeptTarget = (mode) => {
            window.currentDeptTarget = mode;
            document.querySelectorAll('.target-box').forEach(box => box.classList.remove('active'));
            document.getElementById(`target-${mode}`).classList.add('active');
        };

        // Attachment Controls
        mainBtn.onclick = () => menu.classList.toggle('active');
        mediaIcon.onclick = () => {
            mediaArea.style.display = "block";
            mediaArea.scrollIntoView({ behavior: 'smooth' });
            menu.classList.remove('active');
        };

        fileInput.addEventListener('change', function() {
            const files = Array.from(this.files);
            previewGrid.innerHTML = '';
            fileStatus.innerText = `${files.length} MEDIA SELECTED`;
            
            files.forEach(file => {
                const url = URL.createObjectURL(file);
                const div = document.createElement('div');
                div.className = 'preview-item';
                div.innerHTML = file.type.startsWith('image/') ? `<img src="${url}">` : `<video src="${url}"></video>`;
                previewGrid.appendChild(div);
            });
        });

        window.clearDeptMedia = () => {
            fileInput.value = '';
            previewGrid.innerHTML = '';
            fileStatus.innerText = '0 MEDIA SELECTED';
            mediaArea.style.display = 'none';
        };

        window.toggleDeptDate = () => {
            const priority = document.getElementById('noticePriority').value;
            document.getElementById('eventDateWrapper').style.display = (priority === 'event') ? 'block' : 'none';
        };
    </script>
</body>
</html>
