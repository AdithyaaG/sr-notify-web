<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Notices | SR-Notify</title>
    <link rel="stylesheet" href="../../css/role.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .notice-item {
            background: white; padding: 15px; margin-bottom: 15px;
            border-radius: 12px; display: flex; justify-content: space-between;
            align-items: center; border: 1px solid #eee;
            transition: 0.3s;
        }
        .notice-item:hover { border-color: #b3004b; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .notice-info h4 { margin: 0; color: #333; }
        .notice-info p { margin: 5px 0 0; font-size: 0.8rem; color: #777; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        


    </style>
</head>
<body class="admin-body">
    <header class="admin-header" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px;">
    <div style="display: flex; align-items: center; gap: 15px;">
        <img src="../../assets/logo.png" alt="SR-Notify Logo" id="header-logo" style="height: 50px;">
        <div class="header-text">
            <h2 style="margin: 0; color: white;">SR-Notify</h2>
            <p style="margin: 0; color: rgba(255,255,255,0.8); font-size: 0.9rem;">Staff</p>
        </div>
    </div>
    

    <a href="staff_profile.html" class="top-profile-link" style="text-decoration: none;">
        <div id="profile-container" style="width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; overflow: hidden; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.2);">
            <img id="user-header-img" src="" alt="" style="width: 100%; height: 100%; object-fit: cover; display: none;">
            <i id="user-header-icon" class="fas fa-user-circle" style="font-size: 2rem; color: white;"></i>
        </div>
    </a>

    </header>

    <main id="notice-list-container" style="padding: 20px; padding-bottom: 100px;">
        <p style="text-align: center; color: #999;">Loading your notices...</p>
    </main>

  <div id="edit-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; justify-content:center; align-items:center; backdrop-filter: blur(8px); animation: fadeIn 0.3s ease;">
    <div style="background:white; padding:30px; border-radius:24px; width:95%; max-width:450px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); position: relative; overflow: hidden;">
        
        <div id="modal-header-bg" style="background: #1a237e; margin: -30px -30px 25px -30px; padding: 25px; text-align: center;">
            <h3 style="color:white; margin:0; font-family: sans-serif; letter-spacing: 1px;"><i class="fas fa-edit"></i> EDIT NOTICE</h3>
        </div>

        <input type="hidden" id="edit-id">

        <div style="margin-bottom: 15px;">
            <label style="display:block; font-size: 0.85rem; font-weight: bold; color: #1a237e; margin-bottom: 5px;">Notice Title</label>
            <input type="text" id="edit-title" style="width:100%; padding:12px; border:2px solid #f0f0f0; border-radius:12px; outline:none; box-sizing: border-box;">
        </div>

        <div id="edit-event-row" style="margin-bottom: 15px; display: none;">
            <label style="display:block; font-size: 0.85rem; font-weight: bold; color: #ff9800; margin-bottom: 5px;"><i class="fas fa-calendar-day"></i> Event Date</label>
            <input type="date" id="edit-event-date" style="width:100%; padding:12px; border:2px solid #f0f0f0; border-radius:12px; outline:none; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display:block; font-size: 0.85rem; font-weight: bold; color: #1a237e; margin-bottom: 5px;">Description</label>
            <textarea id="edit-content" style="width:100%; padding:12px; border:2px solid #f0f0f0; border-radius:12px; outline:none; height:100px; box-sizing: border-box; resize: none;"></textarea>
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display:block; font-size: 0.85rem; font-weight: bold; color: #1a237e; margin-bottom: 5px;">Expiry Date & Time</label>
            <input type="datetime-local" id="edit-expiry" style="width:100%; padding:12px; border:2px solid #f0f0f0; border-radius:12px; box-sizing: border-box;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label style="display:block; font-size: 0.85rem; font-weight: bold; color: #1a237e; margin-bottom: 5px;">Change Attachment</label>
            <input type="file" id="edit-file-input" accept="image/*,video/*" style="width:100%; padding:10px;">
            <div id="edit-upload-status" style="display:none; color: #b3004b; font-size: 0.8rem;">Uploading new media...</div>
        </div>

        <div style="display:flex; gap:12px; margin-top: 20px;">
            <button id="save-edit-btn" onclick="saveEdit()" style="flex:2; background:#1a237e; color:white; border:none; padding:15px; border-radius:14px; font-weight:bold; cursor:pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <i class="fas fa-check-circle"></i> Save Changes
            </button>
            <button onclick="document.getElementById('edit-modal').style.display='none'" style="flex:1; background:#f5f5f5; color:#666; border:none; padding:15px; border-radius:14px; font-weight:bold; cursor:pointer;">
                Cancel
            </button>
        </div>
    </div>
</div>

    <script type="module" src="../../js/staff_manage.js"></script>
    <script type="module" src="../../js/profile_handler.js"></script>

    <nav class="bottom-nav">
        <a href="staff_clsrom.html" class="nav-item"><i class="fas fa-chalkboard-teacher"></i></a>        
        <a href="staff_home.html" class="nav-item"><i class="fas fa-home"></i></a>
        <a href="staff_cn.html" class="nav-item"><i class="fas fa-plus-square"></i></a>
        <a href="staff_notice.html" class="nav-item"><i class="fas fa-clipboard-list"></i></a>
    </nav>

</body>
</html>
