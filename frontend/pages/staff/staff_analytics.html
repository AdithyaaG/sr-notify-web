<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics | SR-Notify</title>
    <link rel="stylesheet" href="../../css/role.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #1a237e; --success: #2e7d32; --danger: #c62828; }
        .analytics-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 80px; }
        .list-box { background: #fdfdfd; border: 1px solid #eee; border-radius: 10px; height: 350px; overflow-y: auto; padding: 10px; }
        
        /* Filter Button Styles */
        .filter-container { display: flex; gap: 10px; padding: 10px 0; margin-top: 5px; }
        .filter-btn { 
            background: rgba(255, 255, 255, 0.15); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            color: white; padding: 6px 12px; border-radius: 8px; 
            font-size: 0.75rem; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; gap: 5px;
        }
        .filter-btn.active { background: white; color: var(--primary); font-weight: bold; }
        
        .name-tag { padding: 10px; border-bottom: 1px solid #f0f0f0; font-size: 0.85rem; color: #444; display: flex; flex-direction: column; }
        .name-row { display: flex; align-items: center; gap: 8px; width: 100%; }
        .view-details { display: none; padding: 8px 0 5px 25px; font-size: 0.72rem; color: #666; animation: fadeIn 0.3s ease; }
        .view-details.show { display: block; }
        .toggle-btn { margin-left: auto; cursor: pointer; padding: 5px; color: #aaa; transition: transform 0.3s; }
        .toggle-btn.rotate { transform: rotate(180deg); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .count-num { font-size: 1.2rem; font-weight: bold; display: block; }
        .admin-header { background: var(--primary); color: white; padding: 15px 20px; display: flex; flex-direction: column; gap: 10px; }
    </style>
</head>
<body class="admin-body">
    <header class="admin-header">
        <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <img src="../../assets/logo.png" alt="Logo" style="height: 40px;">
                <div>
                    <h2 style="margin: 0; font-size: 1.1rem;">Notice Analytics</h2>
                    <p id="notice-title" style="margin: 0; opacity: 0.8; font-size: 0.75rem;">Loading...</p>
                </div>
            </div>
            <a href="staff_home.html" style="color: white;"><i class="fas fa-times"></i></a>
        </div>

        <div class="filter-container">
            <button id="btn-all" class="filter-btn active" onclick="applyFilter(null, 'btn-all')">All Time</button>
            <button id="btn-weekly" class="filter-btn" onclick="applyFilter(7, 'btn-weekly')">Weekly</button>
            <button id="btn-monthly" class="filter-btn" onclick="applyFilter(30, 'btn-monthly')">Monthly</button>
            <button class="filter-btn" onclick="window.print()" style="margin-left:auto;"><i class="fas fa-download"></i></button>
        </div>
    </header>

    <main style="padding: 20px;">
        <div class="analytics-card">
            <p style="margin-top:0; color: #666; font-size: 0.9rem;">Targeted Students: <strong id="totalCount">0</strong></p>
            <div style="height: 180px; position: relative; margin-bottom: 10px;">
                <canvas id="seenChart"></canvas>
            </div>
            <p id="filter-text" style="font-size: 0.7rem; color: #999; margin: 0;">Showing: All recorded views</p>
        </div>

        <div class="stats-grid">
            <div>
                <h4 style="color: var(--success); margin-bottom:10px;"><span id="vCount" class="count-num">0</span> Viewed</h4>
                <div id="viewedList" class="list-box"></div>
            </div>
            <div>
                <h4 style="color: var(--danger); margin-bottom:10px;"><span id="nvCount" class="count-num">0</span> Not Seen</h4>
                <div id="notViewedList" class="list-box"></div>
            </div>
        </div>
    </main>

<script type="module">
    import { db } from '../../js/firebase-config.js';
    import { collection, query, where, getDocs, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const urlParams = new URLSearchParams(window.location.search);
    const noticeId = urlParams.get('id');
    let chartInstance = null;
    let targetedStudents = [];
    let currentFilterDays = null;
    let rawViewDocs = [];

    // Global filter function
    window.applyFilter = (days, btnId) => {
        currentFilterDays = days;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(btnId).classList.add('active');
        document.getElementById('filter-text').innerText = days ? `Showing: Past ${days} days` : "Showing: All recorded views";
        processData();
    };

    async function initAnalytics() {
        const staffName = localStorage.getItem("userName"); 
        if (!staffName || !noticeId) return;

        try {
            const noticeDoc = await getDoc(doc(db, "notices", noticeId));
            if (noticeDoc.exists()) document.getElementById('notice-title').innerText = noticeDoc.data().title;

            // Get students in the staff's range
            const batchQuery = query(collection(db, "batches"), where("controller_name", "==", staffName));
            const batchSnap = await getDocs(batchQuery);
            if (batchSnap.empty) return;

            const { start_reg, end_reg } = batchSnap.docs[0].data();
            const studentsSnap = await getDocs(collection(db, "students"));
            
            targetedStudents = [];
            studentsSnap.forEach(d => {
                const s = d.data();
                const sId = Number(s.regNo || s.studentId);
                if (sId >= Number(start_reg) && sId <= Number(end_reg)) {
                    targetedStudents.push({ id: sId, name: s.name });
                }
            });

            document.getElementById('totalCount').innerText = targetedStudents.length;

            // Listen for views
            onSnapshot(collection(db, "notices", noticeId, "views"), (vSnap) => {
                rawViewDocs = vSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                processData();
            });

        } catch (e) { console.error(e); }
    }

    function processData() {
        const viewMap = new Map();
        const now = new Date();

        rawViewDocs.forEach(data => {
            if (!data.viewedAt) return;
            const viewDate = data.viewedAt.toDate();

            if (currentFilterDays) {
                const diffTime = Math.abs(now - viewDate);
                const diffDays = diffTime / (1000 * 60 * 60 * 24);
                if (diffDays > currentFilterDays) return;
            }

            viewMap.set(Number(data.id), {
                time: viewDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                date: viewDate.toLocaleDateString([], { day: '2-digit', month: 'short' })
            });
        });

        const seen = targetedStudents.filter(s => viewMap.has(s.id)).map(s => ({...s, ...viewMap.get(s.id)}));
        const notSeen = targetedStudents.filter(s => !viewMap.has(s.id));

        updateUI(seen, notSeen);
    }

    function updateUI(seen, notSeen) {
        document.getElementById('vCount').innerText = seen.length;
        document.getElementById('nvCount').innerText = notSeen.length;
        
        const render = (list, containerId, icon, color, hasTime) => {
            document.getElementById(containerId).innerHTML = list.length ? list.map(s => `
                <div class="name-tag">
                    <div class="name-row">
                        <i class="fas ${icon}" style="color:${color}"></i> 
                        <div style="flex:1"><strong>${s.name}</strong><br><span style="font-size:0.7rem;color:#888;">${s.id}</span></div>
                        ${hasTime ? `<i class="fas fa-chevron-down toggle-btn" onclick="toggleDetails(this)"></i>` : ''}
                    </div>
                    ${hasTime ? `<div class="view-details"><i class="far fa-clock"></i> ${s.time} | ${s.date}</div>` : ''}
                </div>`).join('') : '<p style="text-align:center;color:#999;font-size:0.8rem;">Empty</p>';
        };

        render(seen, 'viewedList', 'fa-check-circle', '#2e7d32', true);
        render(notSeen, 'notViewedList', 'fa-times-circle', '#c62828', false);
        
        const ctx = document.getElementById('seenChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: ['Seen', 'Unseen'], datasets: [{ data: [seen.length, notSeen.length], backgroundColor: ['#2e7d32', '#c62828'] }] },
            options: { cutout: '80%', plugins: { legend: { display: false } }, maintainAspectRatio: false }
        });
    }

    window.toggleDetails = (btn) => {
        btn.parentElement.nextElementSibling.classList.toggle('show');
        btn.classList.toggle('rotate');
    };

    initAnalytics();
</script>

    <nav class="bottom-nav">
        <a href="staff_home.html" class="nav-item"><i class="fas fa-home"></i></a>
        <a href="staff_cn.html" class="nav-item"><i class="fas fa-plus-square"></i></a>
        <a href="staff_notice.html" class="nav-item"><i class="fas fa-clipboard-list"></i></a>
    </nav>
</body>
</html>
