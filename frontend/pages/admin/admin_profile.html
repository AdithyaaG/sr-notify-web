<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | SR-Notify</title>
    <link rel="stylesheet" href="../../css/role.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-body">

    <header class="admin-header" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px;">
    <div style="display: flex; align-items: center; gap: 15px;">
        <img src="../../assets/logo.png" alt="SR-Notify Logo" id="header-logo" style="height: 50px;">
        <div class="header-text">
            <h2 style="margin: 0; color: white;">SR-Notify</h2>
            <p style="margin: 0; color: rgba(255,255,255,0.8); font-size: 0.9rem;">Admin Dashboard</p>
        </div>
    </div>
    

    <a href="admin_profile.html" class="top-profile-link" style="text-decoration: none;">
        <div id="profile-container" style="width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; overflow: hidden; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.2);">
            <img id="user-header-img" src="" alt="" style="width: 100%; height: 100%; object-fit: cover; display: none;">
            <i id="user-header-icon" class="fas fa-user-circle" style="font-size: 2rem; color: white;"></i>
        </div>
    </a>

    </header>

    <main class="profile-container">
    <div class="profile-card">
        <!-- Profile Picture / Icon Area -->
        <div id="profile-pic-container" class="profile-avatar">
        <i class="fas fa-user-circle"></i> </div>
    <div class="role-badge"></div>

        <div class="profile-info-display">
            <div class="info-group">
                <label><i class="fas fa-id-badge"></i> Name</label>
                <div class="info-value" id="disp-name">Loading...</div>
            </div>
            
            <div class="info-group">
                <label><i class="fas fa-briefcase"></i> Designation</label>
                <div class="info-value" id="disp-role">Admin Account</div>
            </div>


            <div class="info-group" id="dept-section">
                <label><i class="fas fa-building"></i> Department Code</label>
                <div class="info-value" id="disp-dept">---</div>
            </div>
        </div>
    </div>

    <div class="logout-section">
        <button class="btn-logout" onclick="handleLogout()">
            <i class="fas fa-power-off"></i> Sign Out
        </button>
    </div>
</main>

     <nav class="bottom-nav">
        <a href="admin_dept_manage.html" class="nav-item"><i class="fas fa-tasks"></i></a>
        <a href="admin_home.html" class="nav-item"><i class="fas fa-home"></i></a>
        <a href="admin_cn.html" class="nav-item active"><i class="fas fa-plus-square"></i></a>
        <a href="admin_notice.html" class="nav-item"><i class="fas fa-clipboard-list"></i></a>
    </nav>

    <script>
    function handleLogout() {
        if(confirm("Are you sure you want to logout?")) {
            window.location.href = "../../login.html";
        }
    }
    </script>

    <script src="../../js/profile_handler.js"></script>
    
</body>
</html>
