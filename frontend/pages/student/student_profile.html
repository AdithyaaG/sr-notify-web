<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | SR-Notify</title>
    <link rel="stylesheet" href="../../css/role.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-body">

    <header class="admin-header">
        <img src="../../assets/logo.png" alt="Logo">
        <div class="header-text">
            <h2>SR-Notify</h2>
            <p>Student </p>
        </div>
    </header>

    <main class="profile-container">
    <div class="profile-card">
        <!-- Profile Picture / Icon Area -->
        <div class="profile-avatar-wrapper">
            <div class="profile-avatar" id="profile-pic-container">
            <i class="fas fa-user-circle" id="default-avatar-icon"></i>
            </div>
            <span class="badge-role">Student</span>
        </div>

        <div class="profile-info-display">
    <div class="info-group">
        <label><i class="fas fa-id-badge"></i> Name</label>
        <div class="info-value" id="disp-name">Loading...</div>
    </div>
    <div class="info-group">
        <label><i class="fas fa-briefcase"></i> Designation</label>
        <div class="info-value" id="disp-role">Student Account</div>
    </div>
    <div class="info-group">
        <label><i class="fas fa-fingerprint"></i> Student ID</label>
        <div class="info-value" id="disp-id">---</div>
    </div>
    <div class="info-group">
    
    </div>
</div>
    </div>

    <div class="logout-section">
        <button class="btn-logout" onclick="handleLogout()">
            <i class="fas fa-power-off"></i> Sign Out
        </button>
    </div>
</main>

    <nav class="bottom-nav">
        <a href="student_profile.html" class="nav-item"><i class="fas fa-user"></i></a>
        <a href="student_home.html" class="nav-item active"><i class="fas fa-home"></i></a>
        <a href="student_notices.html" class="nav-item"><i class="fas fa-history"></i></a>
    </nav>

    <script>
    function handleLogout() {
        if(confirm("Are you sure you want to logout?")) {
            window.location.href = "../../login.html";
        }
    }
    </script>

    <script src="../../js/profile_handler.js"></script>
</body>
</body>
</html>
