<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dept Notices | SR-Notify</title>
    <link rel="stylesheet" href="../../css/role.css">
    <link rel="stylesheet" href="../../css/student_feed.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .notice-card:hover {
            transform: translateY(-2px);
            background-color: #fff !important;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1) !important;
        }

        .popup-content::-webkit-scrollbar { width: 5px; }
        .popup-content::-webkit-scrollbar-thumb { background: #b3004b; border-radius: 10px; }

        /* Fixed Line Clamp Warning */
        .line-clamp {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Pinning specific styles */
        .pinned-badge {
            position: absolute; 
            top: -10px; 
            right: 10px; 
            background: #ff9800; 
            color: white; 
            font-size: 0.65rem; 
            padding: 3px 10px; 
            border-radius: 10px; 
            font-weight: bold; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 5;
        }

        /* Fixed Snap Scroll Warnings & Slider Styles */
        .slider-container { 
            display: flex; 
            overflow-x: auto; 
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            gap: 10px; 
            scroll-behavior: smooth; 
            border-radius: 15px; 
            padding-bottom: 5px; 
        }
        .slider-container::-webkit-scrollbar { height: 4px; }
        .slider-container::-webkit-scrollbar-thumb { background: #b3004b; border-radius: 10px; }
        
        .slider-item { 
            min-width: 100%; 
            scroll-snap-align: center;
            position: relative; 
        }
        .slider-item img, .slider-item video { 
            width: 100%; 
            height: 300px; 
            object-fit: contain; 
            background: #000; 
            border-radius: 15px; 
            display: block; 
        }
    </style>
</head>
<body class="admin-body">

    <header class="admin-header" style="background: #1a237e;">
        <img src="../../assets/logo.png" alt="Logo">
        <div style="display: flex; align-items: center;">
            <a href="student_home.html" style="color: white; margin-right: 15px; font-size: 1.2rem;">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div class="header-text">
                <h2>Department</h2>
                <p>Department Notices</p>
            </div>
        </div>
    </header>

    <main class="admin-content" style="padding: 15px;">
        <div id="dept-notice-container">
            <p style="text-align:center; color:#999; margin-top:50px;">Fetching department updates...</p>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="student_profile.html" class="nav-item"><i class="fas fa-user"></i></a>
        <a href="student_home.html" class="nav-item active"><i class="fas fa-home"></i></a>
        <a href="student_notices.html" class="nav-item"><i class="fas fa-history"></i></a>
    </nav>

    <script type="module">
    import { db } from '../../js/firebase-config.js';
    import { collection, query, where, orderBy, onSnapshot, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const container = document.getElementById('dept-notice-container');
    window.allDeptNotices = {};

    const rawId = localStorage.getItem("userReg") || "";
    const userName = localStorage.getItem("userName") || "Student";
    const myDept = localStorage.getItem("userDept") || (rawId.length >= 5 ? rawId.substring(2, 5) : rawId); 

    let activeIntervals = {};

    function formatWhatsAppTime(date) {
        if (!date) return "";
        const now = new Date();
        const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));
        const options = { hour: 'numeric', minute: '2-digit', hour12: true };
        const timeStr = date.toLocaleTimeString([], options);
        if (diffDays === 0) return `Today, ${timeStr}`;
        if (diffDays === 1) return `Yesterday, ${timeStr}`;
        return `${date.toLocaleDateString([], { month: 'short', day: 'numeric' })}, ${timeStr}`;
    }

    if (container && myDept) {
        const q = query(
            collection(db, "notices"),
            where("targetCode", "==", myDept),
            orderBy("createdAt", "desc")
        );

        onSnapshot(q, async (snapshot) => {
            if (snapshot.empty) {
                container.innerHTML = `
                    <div style="text-align:center; margin-top:50px; color:#999;">
                        <i class="fas fa-folder-open" style="font-size:3rem; margin-bottom:10px; color:#ddd;"></i>
                        <p>No department notices found for ${myDept}.</p>
                    </div>`;
                return;
            }
            await renderNotices(snapshot);
        }, (error) => {
            console.error("Firestore Query Error:", error);
            container.innerHTML = `<p style="text-align:center; color:red; padding:20px;">Unable to load notices.</p>`;
        });
    }

    async function renderNotices(snapshot) {
        Object.values(activeIntervals).forEach(clearInterval);
        activeIntervals = {};
        container.innerHTML = '';

        const now = new Date();
        const twoDaysFromNow = new Date();
        twoDaysFromNow.setDate(now.getDate() + 2);

        let lastProcessedDateString = ""; 

        // Loop changed to for...of to handle await inside
        for (const docSnap of snapshot.docs) {
            const data = docSnap.data();
            const id = docSnap.id;
            window.allDeptNotices[id] = data;

            // --- READ/UNREAD CHECK ---
            let isRead = false;
            try {
                const viewSnap = await getDoc(doc(db, "notices", id, "views", rawId));
                if (viewSnap.exists()) isRead = true;
            } catch (e) { console.error("Read check error:", e); }

            const expiryDate = data.expiresAt?.toDate ? data.expiresAt.toDate() : (data.expiresAt ? new Date(data.expiresAt) : null);
            if (expiryDate && expiryDate <= now) continue;

            const postDate = data.createdAt?.toDate ? data.createdAt.toDate() : (data.createdAt ? new Date(data.createdAt) : new Date());
            const currentNoticeDateString = postDate.toLocaleDateString('en-GB', { 
                day: '2-digit', month: '2-digit', year: '2-digit' 
            }).replace(/\//g, '-') + " " + postDate.toLocaleDateString('en-US', { weekday: 'long' });

            if (currentNoticeDateString !== lastProcessedDateString) {
                const dateLineHtml = `
                    <div style="width: 100%; border-top: 2px solid #333; margin: 30px 0 15px; position: relative; clear: both;">
                        <span style="position: absolute; top: -14px; left: 10px; background: #f0f2f5; padding: 0 12px; font-weight: 800; color: #333; font-size: 0.9rem; font-family: sans-serif;">
                            ${currentNoticeDateString}
                        </span>
                    </div>`;
                container.insertAdjacentHTML('beforeend', dateLineHtml);
                lastProcessedDateString = currentNoticeDateString;
            }

            let isPinned = false;
            if (data.event_date) {
                const eventDate = new Date(data.event_date);
                if (eventDate <= twoDaysFromNow && eventDate >= new Date().setHours(0,0,0,0)) isPinned = true;
            }

            container.insertAdjacentHTML('beforeend', generateCardHtml(id, data, expiryDate, isPinned, myDept, isRead));
            if (expiryDate) startLiveTimer(id, expiryDate);
        }
    }

    function generateCardHtml(id, data, expiryDate, isPinned, myDept, isRead) {
        const accentColor = "#b3004b";
        const pinColor = "#ff9800";
        const postDate = data.createdAt?.toDate ? data.createdAt.toDate() : (data.createdAt ? new Date(data.createdAt) : null);
        const timeDisplay = formatWhatsAppTime(postDate);
        
        // --- NEW: Visual Logic for Read/Unread ---
        const cardBg = isRead ? "white" : "#f0f2f5"; 
        const cardOpacity = isRead ? "1" : "0.85";
        const unreadBadge = isRead ? '' : `<div style="position:absolute; top:10px; right:10px; width:8px; height:8px; background:${accentColor}; border-radius:50%;"></div>`;
        
        let attachmentIcon = "";
        if (data.attachments && data.attachments.length > 0) {
            attachmentIcon = `<i class="fas fa-images" style="margin-left:8px; color:${pinColor};"></i> <span style="font-size:0.7rem; color:#aaa;">${data.attachments.length}</span>`;
        }
        
        return `
            <div class="notice-card" id="dept-card-${id}" onclick="showDeptPopup('${id}')" 
                 style="cursor:pointer; background:${cardBg}; opacity:${cardOpacity}; padding:18px; border-radius:15px; margin-bottom:20px; 
                 border-left:6px solid ${isPinned ? pinColor : accentColor}; 
                 box-shadow: ${isPinned ? '0 4px 15px rgba(255,152,0,0.2)' : '0 4px 12px rgba(0,0,0,0.08)'}; 
                 transition: all 0.3s ease; position:relative;">
                
                ${unreadBadge}
                ${isPinned ? `<div class="pinned-badge" style="position:absolute; top:-10px; right:15px; background:${pinColor}; color:white; font-size:0.65rem; padding:4px 10px; border-radius:10px; font-weight:bold;"><i class="fas fa-thumbtack"></i> UPCOMING EVENT</div>` : ''}

                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px;">
                    <div style="font-weight:bold; color:${isPinned ? '#e65100' : '#333'}; font-size:1.1rem; flex:1; padding-right:10px;">
                        <i class="fas ${isPinned ? 'fa-calendar-day' : 'fa-building'}" style="color:${isPinned ? pinColor : accentColor}; margin-right:8px; font-size:0.9rem;"></i>${data.title} ${attachmentIcon}
                    </div>
                </div>

                <div class="line-clamp" style="font-size:0.9rem; color:#666; line-height:1.5; margin-bottom:12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
                    ${data.content}
                </div>

                <div style="display:flex; justify-content:space-between; align-items:center; font-size:0.75rem; color:#999; border-top:1px solid #f5f5f5; padding-top:10px;">
                    <span><i class="fas fa-user-edit"></i> ${data.authorName} <span style="color:#bbb; font-weight:normal; margin-left:5px;">• ${timeDisplay}</span></span>
                    <span style="background:#fce4ec; color:${accentColor}; padding:2px 8px; border-radius:10px; font-weight:bold;">${myDept} DEPT</span>
                </div>
            </div>`;
    }

    function startLiveTimer(id, expiryDate) {
        activeIntervals[id] = setInterval(() => {
            const timeLeft = expiryDate - new Date();
            if (timeLeft <= 0) {
                const card = document.getElementById(`dept-card-${id}`);
                if (card) { card.style.opacity = "0"; setTimeout(() => card.remove(), 500); }
                clearInterval(activeIntervals[id]);
                return;
            }
            const mins = Math.floor((timeLeft / 1000 / 60) % 60);
            const secs = Math.floor((timeLeft / 1000) % 60);
            const hours = Math.floor(timeLeft / (1000 * 60 * 60));
            const timeText = document.getElementById(`time-text-${id}`);
            if (timeText) timeText.innerText = hours > 0 ? `${hours}h ${mins}m` : `${mins}m ${secs}s`;
        }, 1000);
    }

    window.showDeptPopup = function(id) {
        const notice = window.allDeptNotices[id];
        if (!notice) return;
        
        recordView(id);

        // --- NEW: Immediate UI Update ---
        const card = document.getElementById(`dept-card-${id}`);
        if (card) {
            card.style.background = "white";
            card.style.opacity = "1";
            const badge = card.querySelector('div[style*="border-radius:50%"]');
            if (badge) badge.remove();
        }

        const overlay = document.createElement('div');
        overlay.id = "notice-overlay";
        overlay.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; z-index:10000; padding:20px; backdrop-filter: blur(8px);";
        
        const linkedContent = notice.content.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:#b3004b; text-decoration:underline; font-weight:bold;">$1</a>');
        const postDate = notice.createdAt?.toDate ? notice.createdAt.toDate() : (notice.createdAt ? new Date(notice.createdAt) : null);
        const timeDisplay = formatWhatsAppTime(postDate);

        let mediaHtml = "";
        const items = notice.attachments || [];

        if (items.length > 0) {
            mediaHtml = `<div style="margin-top:20px;"><div style="display:flex; overflow-x:auto; gap:10px;">
                ${items.map(item => {
                    if (item.type === 'image') return `<img src="${item.url}" style="width:100%; border-radius:15px; max-height:300px; object-fit:cover;">`;
                    if (item.type === 'video') return `<video controls style="width:100%; border-radius:15px;"><source src="${item.url}"></video>`;
                    return `<a href="${item.url}" target="_blank" style="padding:40px; background:#fdf2f6; border-radius:15px;"><i class="fas fa-file-pdf"></i> View Doc</a>`;
                }).join('')}
            </div></div>`;
        }

        overlay.innerHTML = `
            <div style="background:white; width:100%; max-width:550px; border-radius:25px; overflow:hidden;">
                <div style="padding:20px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
                    <h2 style="color:#b3004b; margin:0;">${notice.title}</h2>
                    <button onclick="document.getElementById('notice-overlay').remove()" style="border:none; background:#f0f0f0; border-radius:50%; width:35px; height:35px;">&times;</button>
                </div>
                <div style="padding:25px; max-height:70vh; overflow-y:auto;">
                    <div style="white-space:pre-wrap;">${linkedContent}</div>
                    ${mediaHtml}
                </div>
            </div>`;
        document.body.appendChild(overlay);
    };

    async function recordView(noticeId) {
        if (!rawId || !noticeId) return;
        try {
            const viewRef = doc(db, "notices", noticeId, "views", rawId);
            await setDoc(viewRef, { viewerName: userName, viewedAt: serverTimestamp(), studentId: rawId }, { merge: true });
        } catch (e) { console.error("View count error:", e); }
    }
</script>
</body>
</html>
